[build]
  publish = "."
  functions = "netlify/functions"

# Redirect /api/* to Netlify Functions so existing frontend code doesn't need changes
[[redirects]]
  from = "/api/track"
  to = "/.netlify/functions/track"
  status = 200

[[redirects]]
  from = "/api/newsletter"
  to = "/.netlify/functions/newsletter"
  status = 200
